name: Go CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@latest
      - name: Set up Go
        uses: actions/setup-go@latest
        with:
          go-version: 'stable'
      - name: Install dependencies
        run: go mod tidy
      - name: Run unit tests
        run: |
              export CLOUDFLARE_D1_DATABASE_ID="${{secrets.CLOUDFLARE_D1_DATABASE_ID}}"
              export CLOUDFLARE_ACCOUNT_ID="${{secrets.CLOUDFLARE_ACCOUNT_ID}}"
              export CLOUDFLARE_API_TOKEN="${{secrets.CLOUDFLARE_API_TOKEN}}"
              go test -v ./...
